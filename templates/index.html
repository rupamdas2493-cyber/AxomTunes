<!DOCTYPE html>
<html>
<head>
    <title>Zubeen Garg MP3 Player</title>

    <!-- ✅ Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #121212, #000);
            color: white;
            margin-left: 200px;
        }

        /* 🔥 SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 200px;
            height: 100%;
            background: #000;
            padding: 20px;
        }

        .sidebar h2 {
            color: #1db954;
        }

        .sidebar p {
            cursor: pointer;
            color: #aaa;
        }

        .sidebar p:hover {
            color: white;
        }

        /* HEADER */
        .header {
            padding: 20px;
            text-align: center;
            background: #181818;
        }

        .subtitle {
            color: #aaa;
        }

        /* SEARCH */
        .search-box {
            text-align: center;
            margin: 20px;
        }

        .search-box input {
            width: 250px;
            padding: 10px;
            border-radius: 20px;
            border: none;
        }

        .search-box button {
            padding: 10px;
            border-radius: 20px;
            background: #1db954;
            border: none;
            color: white;
        }

        /* GRID */
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding-bottom: 120px;
        }

        .card {
            background: #181818;
            margin: 10px;
            padding: 10px;
            border-radius: 12px;
            width: 160px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #282828;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        /* PLAYER */
        .player {
            position: fixed;
            bottom: 0;
            width: calc(100% - 200px);
            background: rgba(24,24,24,0.95);
            padding: 15px;
            text-align: center;
        }

        .controls button {
            background: #1db954;
            border: none;
            padding: 10px;
            margin: 5px;
            border-radius: 50%;
            color: white;
        }

        #progress {
            width: 60%;
        }

        #volume {
            width: 100px;
        }

        @media(max-width:768px){
            body {
                margin-left: 0;
            }
            .sidebar {
                display: none;
            }
            .player {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<!-- 🔥 SIDEBAR -->
<div class="sidebar">
    <h2>🎧 Zubeen</h2>
    <p>Home</p>
    <p>Search</p>
    <p>Your Library</p>
</div>

<div class="header">
    <h1>🎧 Zubeen Garg MP3 Player</h1>
    <p class="subtitle">Dedicated to Zubeen Da ❤️</p>
</div>

<div class="search-box">
    <form method="POST" action="/search">
        <input type="text" name="query" placeholder="Search songs..." required>
        <button type="submit">Search</button>
    </form>
</div>

<div id="videoPlayer"></div>

<div class="grid">
    {% for song in songs %}
        <div class="card"
             onclick="playSong('{{ url_for('get_song', filename=song) }}', '{{ song }}')">

            <img src="/static/covers/{{ song.replace('.mp3', '.jpg') }}"
                 onerror="this.src='/static/default.jpg'">

            <p>{{ song }}</p>
        </div>
    {% endfor %}
</div>

<!-- 🎧 PLAYER -->
<div class="player">
    <h3 id="nowPlaying">No song playing</h3>

    <audio id="player"></audio>

    <input type="range" id="progress" value="0">

    <br>

    <!-- 🔊 Volume -->
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶️</button>
        <button onclick="nextSong()">⏭</button>
    </div>
</div>

<script>
let songs = {{ songs | tojson }};
let currentIndex = 0;
let player = document.getElementById("player");
let progress = document.getElementById("progress");
let volume = document.getElementById("volume");
let playBtn = document.getElementById("playBtn");

function playSong(url, name) {
    currentIndex = songs.indexOf(name);
    player.src = url;
    player.play();
    playBtn.innerText = "⏸";
    document.getElementById("nowPlaying").innerText = "🎵 " + name;
}

function togglePlay() {
    if (player.paused) {
        player.play();
        playBtn.innerText = "⏸";
    } else {
        player.pause();
        playBtn.innerText = "▶️";
    }
}

function nextSong() {
    currentIndex = (currentIndex + 1) % songs.length;
    playSong("/songs/" + songs[currentIndex], songs[currentIndex]);
}

function prevSong() {
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    playSong("/songs/" + songs[currentIndex], songs[currentIndex]);
}

player.addEventListener("ended", nextSong);

player.addEventListener("timeupdate", () => {
    if (player.duration) {
        progress.value = (player.currentTime / player.duration) * 100;
    }
});

progress.addEventListener("input", () => {
    if (player.duration) {
        player.currentTime = (progress.value / 100) * player.duration;
    }
});

/* 🔊 Volume control */
volume.addEventListener("input", () => {
    player.volume = volume.value;
});

function playVideo(id) {
    document.getElementById("videoPlayer").innerHTML = `
        <iframe width="400" height="250"
            src="https://www.youtube.com/embed/${id}"
            frameborder="0"
            allowfullscreen>
        </iframe>
    `;
}
</script>

</body>
</html>
